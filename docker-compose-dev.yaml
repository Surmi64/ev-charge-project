name: fuelup-dev
services:
  db:
    image: postgres:17-alpine
    container_name: ev_postgres-dev
    restart: always
    environment:
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: ev_password
      POSTGRES_DB: ev_charger
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user -d ev_charger"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: ev_backend-dev
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ev_charger
      DB_USER: ev_user
      DB_PASS: ev_password
    ports:
      - "4646:4646"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4646
    container_name: ev_frontend-dev
    restart: always
    ports:
      - "4242:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4646

volumes:
  db_data:
